version: '3.8'

services:
  db-v2:
    image: postgres:15-alpine
    container_name: hospital-db-v2
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: hospital_db_v2
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_db_v2"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hospital-network-v2

  web-v2:
    # ✅ Use pre-built image with deps already installed (NOT python:3.11-slim)
    image: bilal888/hospital-management:latest
    container_name: hospital-web-v2
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:yourpassword@db-v2:5432/hospital_db_v2
      SECRET_KEY: secret-key-bilal878
      ENVIRONMENT: production
    ports:
      - "8300:8200"
    volumes:
      # ✅ Mount code ONLY - dependencies already in image
      - ./backend:/app/backend
    working_dir: /app/backend
    # ✅ Simple command - no apt-get, no pip install!
    command: uvicorn app.main:app --host 0.0.0.0 --port 8200 --reload
    depends_on:
      db-v2:
        condition: service_healthy
    networks:
      - hospital-network-v2

volumes:
  postgres_data_v2:

networks:
  hospital-network-v2:
    driver: bridge
